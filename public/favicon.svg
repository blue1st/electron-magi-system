<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Pure Transparent Background, only glowing orange 3-node triad triangle -->
  <g filter="url(#glow)">
    <polygon points="256,120 130,370 382,370" fill="none" stroke="#ff6b00" stroke-width="24" stroke-linejoin="round" stroke-linecap="round"/>
    <polygon points="256,120 130,370 382,370" fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Top Node -->
    <circle cx="256" cy="120" r="38" fill="#0f1115" stroke="#ff6b00" stroke-width="12"/>
    <circle cx="256" cy="120" r="16" fill="#ffffff"/>
    
    <!-- Bottom Left Node -->
    <circle cx="130" cy="370" r="38" fill="#0f1115" stroke="#ff6b00" stroke-width="12"/>
    <circle cx="130" cy="370" r="16" fill="#ffffff"/>
    
    <!-- Bottom Right Node -->
    <circle cx="382" cy="370" r="38" fill="#0f1115" stroke="#ff6b00" stroke-width="12"/>
    <circle cx="382" cy="370" r="16" fill="#ffffff"/>
  </g>
</svg>